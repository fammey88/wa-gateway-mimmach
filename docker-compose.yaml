services:
  wa-gateway:
    container_name: "wa-gateway"
    restart: unless-stopped
    image: mimamch/wa-gateway:latest
    volumes:
      - ./wa_credentials:/app/wa_credentials
      - ./media:/app/media
    ports:
      - "5001:5001"
    environment:
      - KEY=secret
      - WEBHOOK_BASE_URL="https://fammey88.konek.web.id/mima.php"
      - REDIS_URL=
